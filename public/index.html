<!DOCTYPE html>
<html lang="en" data-api-base="https://calculator-api-jyu3.onrender.com">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial, Helvetica, sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:#f4f4f4;
}

.container{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
width:350px;
}

h1{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

.btn{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

button{
flex:1;
padding:10px;
border:none;
border-radius:6px;
background:black;
color:white;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

#response{
margin-top:15px;
font-weight:bold;
text-align:center;
}
</style>

</head>

<body>

<div class="container">

<h1>Calculator</h1>

<input type="number" id="first_num" placeholder="Enter first number">
<input type="number" id="second_num" placeholder="Enter second number">

<div class="btn">
<button onclick="add()">Sum</button>
<button onclick="subs()">Sub</button>
<button onclick="mult()">Mul</button>
<button onclick="divi()">Div</button>
</div>

<div id="response">Result will appear here</div>

</div>

<script src="index.js"></script>

</body>
</html>
